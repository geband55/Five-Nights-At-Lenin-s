name: Build Windows

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Build game
        shell: powershell
        run: |
          $unityPath = "C:\Program Files\Unity\Hub\Editor\6000.0.32f1\Editor\Unity.exe"
          $projectPath = "${{ github.workspace }}"
          $buildPath = Join-Path $projectPath "build\StandaloneWindows64"
          if (!(Test-Path $buildPath)) { New-Item -ItemType Directory -Force -Path $buildPath }
          & "$unityPath" -batchmode `
            -projectPath "$projectPath" `
            -executeMethod BuildScript.BuildWindows `
            -buildTarget StandaloneWindows64 `
            -logFile "$projectPath\unity_build.log" `
            -quit

      - name: Setup SSH for Git
        shell: powershell
        run: |
          Start-Service ssh-agent
          ssh-add "C:\Users\user\.ssh\id_ed25519"
          git remote set-url origin git@github.com:geband55/Five-Nights-At-Lenin-s.git

      - name: Upload build to LFS
        if: always()
        shell: powershell
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -f build/StandaloneWindows64/
          git commit -m "Build: Windows $($env:GITHUB_SHA)" -ErrorAction SilentlyContinue
          git push origin HEAD:main